<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexaCore — Staff Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0d1117;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-wrap{width:100%;max-width:380px;padding:20px}
    .login-box{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:32px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
    .login-brand{display:flex;align-items:center;gap:10px;margin-bottom:28px}
    .login-brand-mark{width:28px;height:28px;background:linear-gradient(135deg,#0057b8,#00a8e8);border-radius:6px}
    .login-brand-text{font-size:15px;font-weight:700;color:#e6edf3;letter-spacing:-.2px}
    .login-brand-text span{color:#58a6ff}
    .login-title{font-size:20px;font-weight:600;color:#e6edf3;margin-bottom:4px}
    .login-sub{font-size:13px;color:#8b949e;margin-bottom:24px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:12px;font-weight:500;color:#8b949e;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
    .field input{width:100%;padding:10px 13px;background:#0d1117;border:1px solid #30363d;border-radius:6px;font-size:13px;color:#e6edf3;font-family:inherit;outline:none;transition:border .15s}
    .field input:focus{border-color:#0057b8}
    .error-msg{background:#1a0a0a;border:1px solid #4c0519;border-radius:6px;padding:10px 13px;font-size:12px;color:#f87171;margin-bottom:14px;display:none}
    .error-msg.show{display:block}
    .btn-login{width:100%;padding:11px;background:#0057b8;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;font-family:inherit}
    .btn-login:hover{background:#0046a0}
    .security-note{margin-top:24px;padding:10px 13px;background:#0d1117;border:1px solid #21262d;border-radius:6px;font-size:11px;color:#484f58;line-height:1.5}
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-brand-mark"></div>
      <div class="login-brand-text">Nexa<span>Core</span></div>
    </div>
    <div class="login-title">Staff Portal</div>
    <div class="login-sub">Internal access only — NexaCore employees</div>

    <div class="error-msg" id="err">Invalid credentials. This access attempt has been logged.</div>

    <form id="loginForm">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" placeholder="yourname@nexacore.io" autocomplete="off" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" required>
      </div>
      <button class="btn-login" type="submit">Sign In to Portal</button>
    </form>

    <div class="security-note">
      This system is for authorized NexaCore employees only. All access attempts are monitored and logged. Unauthorized access is a violation of company policy and applicable law.
    </div>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const user = document.getElementById('username').value;
  const pass = document.getElementById('password').value;
  
  // Pointing to the Vercel Serverless Function
  fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: user, password: pass })
  }).then(r => r.text()).then(data => {
    // Reveal the honeypot "logged" message
    document.getElementById('err').classList.add('show');
  });
});
</script>
</body>
</html>
