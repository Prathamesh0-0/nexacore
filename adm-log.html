<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaCore — Staff Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f4f1ec;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-wrap { width: 400px; }

.login-brand {
  text-align: center;
  margin-bottom: 32px;
}
.login-brand-name {
  font-size: 22px;
  font-weight: 700;
  color: #0a0a0a;
  letter-spacing: -0.3px;
}
.login-brand-name span { color: #c8a96e; }
.login-brand-sub {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: #999;
  margin-top: 4px;
}

.login-box {
  background: #fff;
  border: 1px solid #e8e4dc;
  padding: 40px;
}

.login-title {
  font-size: 20px;
  font-weight: 600;
  color: #0a0a0a;
  margin-bottom: 6px;
}
.login-sub {
  font-size: 13px;
  color: #999;
  margin-bottom: 30px;
}

.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #555;
  margin-bottom: 7px;
}
.field input {
  width: 100%;
  padding: 11px 14px;
  border: 1px solid #ddd;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: #111;
  outline: none;
  transition: border 0.15s;
  background: #fafafa;
}
.field input:focus { border-color: #c8a96e; background: #fff; }

.error-msg {
  font-size: 12px;
  color: #c0392b;
  background: #fdf0ef;
  border: 1px solid #f5c6c6;
  padding: 9px 13px;
  margin-bottom: 16px;
  display: none;
}
.error-msg.show { display: block; }

.btn-login {
  width: 100%;
  padding: 12px;
  background: #0a0a0a;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
  border: none;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-login:hover { background: #c8a96e; }

.login-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #aaa;
}
.login-footer a { color: #c8a96e; text-decoration: none; }

.notice {
  margin-top: 28px;
  padding: 12px 16px;
  background: #f9f7f3;
  border-left: 3px solid #c8a96e;
  font-size: 11px;
  color: #888;
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <div class="login-brand-name">NexaCore <span>Properties</span></div>
    <div class="login-brand-sub">Internal Staff Portal</div>
  </div>

  <div class="login-box">
    <div class="login-title">Sign In</div>
    <div class="login-sub">Authorised NexaCore staff only</div>

    <div class="error-msg" id="err-msg">
      Invalid credentials. This attempt has been logged and flagged for review.
    </div>

    <form id="loginForm">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" name="username" placeholder="staff@nexacoreproperties.in" autocomplete="off">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password">
      </div>
      <button class="btn-login" type="submit">Sign In to Portal</button>
    </form>

    <div class="login-footer">
      Forgot password? <a href="#">Contact IT</a>
    </div>
  </div>

  <div class="notice">
    This system is monitored. All access is logged. Unauthorised access is a criminal offence under the IT Act, 2000.
  </div>
</div>

<script>
// ── CREDENTIALS CONFIG ──────────────────────────────────────
// Real creds → redirect to real admin panel
// Honeypot cred → redirect to fake panel (attacker trap)
const REAL_USERS = {
  "admin":  "nexacore@secure2025",
  "vikram": "VikramM@portal99"
};
const HONEYPOT_USERS = {
  "pratham": "mysecretpass"
};

// Backend URL — update this to your ngrok/local URL
// e.g. "http://localhost:8080" or "https://abc123.ngrok.io"
const BACKEND = window.BACKEND_URL || "http://localhost:8080";

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const err  = document.getElementById('err-msg');

  if (!user || !pass) return;

  // Always send to PhantomNet backend for logging
  try {
    await fetch(BACKEND + '/adm-log/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`
    });
  } catch(e) {
    // backend might be offline in demo, that's fine
  }

  if (REAL_USERS[user] && REAL_USERS[user] === pass) {
    // Legitimate login → real admin panel
    window.location.href = '/real-admin.html?token=' + btoa(user + ':' + Date.now());
  } else if (HONEYPOT_USERS[user] && HONEYPOT_USERS[user] === pass) {
    // Honeypot login → fake admin panel (attacker trap)
    window.location.href = '/fake-admin.html?u=' + encodeURIComponent(user);
  } else {
    err.classList.add('show');
    document.getElementById('password').value = '';
  }
});
</script>
</body>
</html>
